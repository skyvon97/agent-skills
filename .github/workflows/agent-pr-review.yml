name: Agent PR Review

"on":
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to review"
        required: true
        type: string
      verdict:
        description: "Review event to post"
        required: true
        type: choice
        options:
          - APPROVE
          - REQUEST_CHANGES
          - COMMENT
      body_b64:
        description: "Base64-encoded Markdown review body"
        required: true
        type: string
      head_sha:
        description: "Expected PR head SHA; fail if the PR moved"
        required: false
        type: string
      agent_name:
        description: "Human-readable agent identity to include in the review body"
        required: false
        default: "agent review-pr"
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  post-review:
    name: Post PR review
    runs-on: ubuntu-latest
    steps:
      - name: Validate and post review
        env:
          AGENT_REVIEW_APP_ID: ${{ vars.AGENT_REVIEW_APP_ID }}
          AGENT_REVIEW_APP_PRIVATE_KEY: ${{ secrets.AGENT_REVIEW_APP_PRIVATE_KEY }}
          AGENT_REVIEW_TOKEN: ${{ secrets.AGENT_REVIEW_TOKEN }}
          FALLBACK_GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          VERDICT: ${{ inputs.verdict }}
          BODY_B64: ${{ inputs.body_b64 }}
          EXPECTED_HEAD_SHA: ${{ inputs.head_sha }}
          AGENT_NAME: ${{ inputs.agent_name }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          create_app_installation_token() {
            local api_url installation_id jwt token_payload
            api_url="${GITHUB_API_URL:-https://api.github.com}"
            jwt=$(node <<'NODE'
          const crypto = require('crypto');

          function base64url(input) {
            return Buffer.from(input)
              .toString('base64')
              .replace(/=/g, '')
              .replace(/\+/g, '-')
              .replace(/\//g, '_');
          }

          const appId = process.env.AGENT_REVIEW_APP_ID;
          const privateKey = (process.env.AGENT_REVIEW_APP_PRIVATE_KEY || '').replace(/\\n/g, '\n');
          const now = Math.floor(Date.now() / 1000);
          const header = base64url(JSON.stringify({ alg: 'RS256', typ: 'JWT' }));
          const payload = base64url(JSON.stringify({
            iat: now - 60,
            exp: now + 540,
            iss: appId,
          }));
          const unsigned = `${header}.${payload}`;
          const signature = crypto
            .createSign('RSA-SHA256')
            .update(unsigned)
            .sign(privateKey, 'base64')
            .replace(/=/g, '')
            .replace(/\+/g, '-')
            .replace(/\//g, '_');
          process.stdout.write(`${unsigned}.${signature}`);
          NODE
          )

            installation_id=$(
              curl -fsSL \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer $jwt" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "$api_url/repos/$REPOSITORY/installation" |
                jq -r '.id'
            )

            if ! [[ "$installation_id" =~ ^[0-9]+$ ]]; then
              echo "Could not find a GitHub App installation for $REPOSITORY" >&2
              exit 1
            fi

            token_payload=$(jq -nc '{permissions:{pull_requests:"write",contents:"read"}}')
            curl -fsSL \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $jwt" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d "$token_payload" \
              "$api_url/app/installations/$installation_id/access_tokens" |
              jq -r '.token'
          }

          if [ -n "${AGENT_REVIEW_APP_ID:-}" ] && [ -n "${AGENT_REVIEW_APP_PRIVATE_KEY:-}" ]; then
            export GH_TOKEN="$(create_app_installation_token)"
          elif [ -n "${AGENT_REVIEW_TOKEN:-}" ]; then
            export GH_TOKEN="$AGENT_REVIEW_TOKEN"
          elif [ "$VERDICT" = "COMMENT" ]; then
            export GH_TOKEN="$FALLBACK_GITHUB_TOKEN"
          else
            cat >&2 <<'EOF'
          A separate review identity is required for APPROVE and REQUEST_CHANGES.

          GitHub does not allow the repository GITHUB_TOKEN to approve pull requests.
          Configure either:
          - AGENT_REVIEW_APP_ID repository variable plus AGENT_REVIEW_APP_PRIVATE_KEY secret
            for a GitHub App installed on this repository with Pull requests write access, or
          - AGENT_REVIEW_TOKEN secret for a separate bot account fine-grained PAT with
            pull request read/write access to this repository.
          EOF
            exit 1
          fi

          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "pr_number must be numeric" >&2
            exit 1
          fi

          case "$VERDICT" in
            APPROVE|REQUEST_CHANGES|COMMENT) ;;
            *)
              echo "verdict must be APPROVE, REQUEST_CHANGES, or COMMENT" >&2
              exit 1
              ;;
          esac

          pr_json=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json state,isDraft,headRefOid)
          state=$(jq -r '.state' <<<"$pr_json")
          is_draft=$(jq -r '.isDraft' <<<"$pr_json")
          current_head_sha=$(jq -r '.headRefOid' <<<"$pr_json")

          if [ "$state" != "OPEN" ]; then
            echo "PR #$PR_NUMBER is not open; current state is $state" >&2
            exit 1
          fi

          if [ "$VERDICT" = "APPROVE" ] && [ "$is_draft" = "true" ]; then
            echo "Refusing to approve draft PR #$PR_NUMBER" >&2
            exit 1
          fi

          if [ -n "$EXPECTED_HEAD_SHA" ] && [ "$EXPECTED_HEAD_SHA" != "$current_head_sha" ]; then
            echo "PR head moved from $EXPECTED_HEAD_SHA to $current_head_sha" >&2
            exit 1
          fi

          review_body=$(mktemp)
          if ! printf '%s' "$BODY_B64" | base64 --decode > "$review_body"; then
            echo "body_b64 is not valid base64" >&2
            exit 1
          fi

          payload=$(mktemp)
          jq -n \
            --arg event "$VERDICT" \
            --arg body "> Posted by $AGENT_NAME through \`$WORKFLOW_NAME\` run $RUN_ID: $RUN_URL"$'\n\n'"$(cat "$review_body")" \
            '{event: $event, body: $body}' > "$payload"

          if ! api_output=$(gh api \
            --method POST \
            "repos/$REPOSITORY/pulls/$PR_NUMBER/reviews" \
            --input "$payload" 2>&1); then
            echo "$api_output" >&2
            echo "Failed to post $VERDICT review on PR #$PR_NUMBER" >&2
            exit 1
          fi

          echo "Posted $VERDICT review on PR #$PR_NUMBER"
